<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="RandR Lite - showcase image display page" />
    <title>RandR Lite</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        line-height: 1.6;
      }

      .card {
        width: min(100%, 880px);
        background: #ffffff;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 24px;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }

      .hero {
        display: grid;
        gap: 1.5rem;
        padding: 3rem;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.5rem);
        letter-spacing: -0.04em;
      }

      .hero p {
        margin: 0;
        max-width: 48rem;
        color: #475569;
        font-size: 1.05rem;
      }

      .image-wrapper {
        display: grid;
        place-items: center;
        background: #e2e8f0;
        padding: 1.5rem;
      }

      .image-wrapper img {
        width: 100%;
        max-width: 760px;
        height: auto;
        border-radius: 18px;
        object-fit: cover;
        background: #cbd5e1;
      }

      .caption {
        margin-top: 1rem;
        color: #64748b;
        font-size: 0.95rem;
      }

      @media (max-width: 640px) {
        .card {
          border-radius: 20px;
          box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        }

        .hero {
          padding: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <article class="card">
      <section class="hero">
        <div>
          <p>RandR Lite</p>
          <h1>Image preview page</h1>
          <p>
            This production-ready landing page displays a featured image with clean responsive styling,
            optimized typography, and accessible markup.
          </p>
        </div>

        <figure class="image-wrapper">
          <img
            src="./images/logo_cut.png"
            alt="Featured image preview"
            loading="lazy"
          />
          <figcaption class="caption">
            Example image link shown here; replace the URL with your actual asset path for production.
          </figcaption>
        </figure>
      </section>
    </article>
  </body>
</html>
